version: '3.9'

services:
  # ─── Nexora Connect Engine ─────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: artifacts/api-server/docker/Dockerfile
    container_name: nexora-api
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexora}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-nexora_connect}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: 'false'
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexora-net
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:5000/api/healthz']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexora_connect}
      POSTGRES_USER: ${POSTGRES_USER:-nexora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - nexora-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nexora} -d ${POSTGRES_DB:-nexora_connect}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexora-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redissecret}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    networks:
      - nexora-net
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD:-redissecret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Commander (Dev UI) ──────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: nexora-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redissecret}
    ports:
      - '8081:8081'
    depends_on:
      - redis
    networks:
      - nexora-net
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  nexora-net:
    driver: bridge
