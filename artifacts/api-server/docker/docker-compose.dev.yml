version: '3.9'

# Development override — starts only infra services
services:
  postgres:
    image: postgres:16-alpine
    container_name: nexora-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexora_connect
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexora -d nexora_connect']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexora-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
